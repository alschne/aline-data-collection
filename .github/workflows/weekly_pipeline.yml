name: Weekly Analytics Pipeline

on:
  schedule:
    - cron: "0 8 * * 1"   # Weekly — Monday 8AM UTC
    - cron: "0 8 * * *"   # Daily — 8AM UTC, for quarter/year-end date checks

  workflow_dispatch:
    inputs:
      mode:
        description: 'Run mode'
        required: false
        default: 'weekly'
        type: choice
        options:
          - weekly
          - quarterly
          - annual
          - all_reviews

env:
  IG_APP_ID: ${{ secrets.IG_APP_ID }}
  IG_APP_SECRET: ${{ secrets.IG_APP_SECRET }}
  IG_ACCESS_TOKEN: ${{ secrets.IG_ACCESS_TOKEN }}
  IG_ACCOUNT_ID: ${{ secrets.IG_ACCOUNT_ID }}
  GA4_PROPERTY_ID: ${{ secrets.GA4_PROPERTY_ID }}
  GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
  GOOGLE_SPREADSHEET_ID: ${{ secrets.GOOGLE_SPREADSHEET_ID }}
  EMAIL_SENDER: ${{ secrets.EMAIL_SENDER }}
  EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
  EMAIL_RECIPIENT: ${{ secrets.EMAIL_RECIPIENT }}
  GOOGLE_AI_API_KEY: ${{ secrets.GOOGLE_AI_API_KEY }}
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  GITHUB_REPO: ${{ github.repository }}

jobs:
  weekly-pipeline:
    # Only run on Mondays or manual weekly trigger
    if: |
      (github.event_name == 'schedule' && startsWith(github.event.schedule, '0 8 * * 1')) ||
      (github.event_name == 'workflow_dispatch' && (github.event.inputs.mode == 'weekly' || github.event.inputs.mode == ''))
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt
      - run: python3 src/main.py

  quarterly-and-annual-reviews:
    # Runs daily to check if today is a quarter/year-end date, or on manual trigger
    if: |
      github.event_name == 'schedule' ||
      (github.event_name == 'workflow_dispatch' && (github.event.inputs.mode == 'quarterly' || github.event.inputs.mode == 'annual' || github.event.inputs.mode == 'all_reviews'))
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt
      - name: Run scheduled reviews
        if: github.event_name == 'schedule'
        run: |
          DAY=$(date -u +"%m-%d")
          echo "Today is $DAY"
          if [ "$DAY" = "03-31" ]; then
            python3 src/review_runner.py --quarterly --q 1
          elif [ "$DAY" = "06-30" ]; then
            python3 src/review_runner.py --quarterly --q 2
          elif [ "$DAY" = "09-30" ]; then
            python3 src/review_runner.py --quarterly --q 3
          elif [ "$DAY" = "12-31" ]; then
            python3 src/review_runner.py --all
          else
            echo "No review scheduled for today — skipping."
          fi
      - name: Run manual review
        if: github.event_name == 'workflow_dispatch'
        run: |
          MODE="${{ github.event.inputs.mode }}"
          if [ "$MODE" = "quarterly" ]; then python3 src/review_runner.py --quarterly
          elif [ "$MODE" = "annual" ]; then python3 src/review_runner.py --annual
          elif [ "$MODE" = "all_reviews" ]; then python3 src/review_runner.py --all
          fi